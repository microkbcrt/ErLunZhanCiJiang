name: Build Cordova Android (Debug 32-bit)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        # Cordova Android 12+ 需要 Java 17，注释已修正
        java-version: '17' 

    - name: Install Cordova
      run: npm install -g cordova

    - name: Install Dependencies
      run: npm install

    # [新增] 接受 Android SDK 许可证，防止构建因许可证问题失败
    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    # [新增] 配置 32 位架构 (armeabi-v7a)
    # 通过生成 build-extras.gradle 文件，告诉 Gradle 只打包 32 位库
    - name: Configure 32-bit Architecture
      run: |
        cat <<EOF > build-extras.gradle
        android {
            defaultConfig {
                ndk {
                    abiFilters "armeabi-v7a"
                }
            }
        }
        EOF
        echo "已生成 build-extras.gradle，强制限制为 32 位架构"

    - name: Add Android Platform
      run: cordova platform add android

    - name: Build Debug APK
      # 确保构建时使用 gradle
      run: cordova build android --debug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk-32bit
        # 文件路径不变，但内容已限制为 32 位
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
